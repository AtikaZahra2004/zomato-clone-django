
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* ===== Payment Status Page ===== */
body {
  background-color: #f4f7fa;
  font-family: "Poppins", sans-serif;
  margin: 0;
  padding: 0;
}

/* Center main container */
.container {
  text-align: center;
  margin-top: 120px;
}

/* Success icon */
.fa-check-circle {
  font-size: 80px;
  color: #28a745;
  animation: pop 0.6s ease-in-out;
}

/* Failure icon (if used later) */
.fa-times-circle {
  font-size: 80px;
  color: #dc3545;
  animation: shake 0.5s ease-in-out;
}

/* Main heading */
h2 {
  text-align: center;
  color: #333;
  font-weight: 600;
  margin-top: 20px;
}

/* Button section */
.text-center {
  text-align: center;
}

.mt-5 {
  margin-top: 50px;
}

/* Button styling */
.btn {
  padding: 12px 28px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.3s ease;
  display: inline-block;
}

.btn-primary {
  background-color: #f1e90b;
  color: rgb(11, 11, 11);
  border: none;
}

.btn-primary:hover {
  background-color: #0056b3;
  transform: scale(1.05);
}

/* ===== Animations ===== */
@keyframes pop {
  0% {
    transform: scale(0);
  }
  70% {
    transform: scale(1.2);
  }
  100% {
    transform: scale(1);
  }
}

@keyframes shake {
  0%, 100% {
    transform: translateX(0);
  }
  25% {
    transform: translateX(-5px);
  }
  50% {
    transform: translateX(5px);
  }
  75% {
    transform: translateX(-5px);
  }
}

</style>

<body>
    {% if status %}
        <div class="container" style="text-align: center;">
            <i class="fa fa-check-circle" aria-hidden="true" style="font-size: 80px; color: green;"></i>
        </div>
        <h2 style="text-align: center;">Thank you. Your payment was successful.</h2>
{% else %}
        <h2 style="text-align: center;">Your Payment is failed! Try again.</h2>
{% endif %}

<div class="text-center mt-5">
    <a href="{% url 'shop' %}" class="btn btn-primary" role="button">Buy another one</a>
</div>
</body>
</html>
