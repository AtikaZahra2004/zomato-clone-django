{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - GOMOTO</title>
  <link rel="stylesheet" href="{% static 'css/signin.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="overlay"></div>

<div class="login-modal">
  <div class="image-section">
    <img src="{% static 'images/jewelry-hand.jpg' %}" alt="Fashion Image">
  </div>

  <div class="form-section">
    <h2>Sign in</h2>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="input-box">
        <input type="text" name="username" placeholder="Name*" required>
      </div>

      <div class="input-box password-box">
        <input type="password" name="password" placeholder="Password*" id="password" required>
        <span class="toggle"><i class="fa fa-eye" onclick="togglePassword()"></i></span>
      </div>

      <a href="#" class="forgot">Forgot password?</a>

      <button type="submit" class="btn">SIGN IN</button>

      <p class="signup-text">
        Don’t have an account? <a href="#">Sign up</a>
      </p>
    </form>
  </div>

  <span class="close-btn" onclick="window.location.href='/'">&times;</span>
</div>

<script>
function togglePassword() {
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
